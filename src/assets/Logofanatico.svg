<svg width="156" height="26" viewBox="0 0 156 26" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow: visible;">
  <style>
    :root{
      --cycle: 30s; /* ✅ ciclo completo */

      /* logo pulse: 11s a 13s */
      --logoPulseStart: 36.666%; /* 11s */
      --logoPulseEnd:   43.333%; /* 13s */

      /* mundialista: 15s a 17s */
      --mundiPulseStart: 50%;     /* 15s */
      --mundiPulseEnd:   56.666%; /* 17s */
    }

    .etLogo{
      animation: pulseLogo var(--cycle) infinite;
      transform-origin: center;
      transform-box: fill-box;
      will-change: transform, filter;
    }

    .mundialista{
      animation: pulseMundi var(--cycle) infinite;
      transform-origin: center;
      transform-box: fill-box;
      will-change: transform, filter;
    }

    /* Palpita por 2s entre 11s-13s */
    @keyframes pulseLogo{
      0%, 36.666% { transform: scale(1); filter: none; }
      38%  { transform: scale(1.08); filter: drop-shadow(0 2px 6px rgba(255,255,255,.25)); }
      39.5%{ transform: scale(1); }
      41%  { transform: scale(1.08); filter: drop-shadow(0 2px 6px rgba(255,255,255,.25)); }
      43.333%, 100% { transform: scale(1); filter: none; }
    }

    /* Palpita por 2s entre 15s-17s */
    @keyframes pulseMundi{
      0%, 50% { transform: scale(1); filter: none; }
      51.5% { transform: scale(1.06); filter: drop-shadow(0 2px 8px rgba(198,246,0,.35)); }
      53%   { transform: scale(1); }
      54.5% { transform: scale(1.06); filter: drop-shadow(0 2px 8px rgba(198,246,0,.35)); }
      56.666%, 100% { transform: scale(1); filter: none; }
    }

    @media (prefers-reduced-motion: reduce){
      .etLogo,.mundialista{ animation: none !important; }
    }
  </style>

